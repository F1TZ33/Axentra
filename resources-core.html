<script>
(() => {
  try {

    const buildBtn = document.getElementById('buildBtn');
    const resetBtn = document.getElementById('resetBtn');
    const copyCsvBtn = document.getElementById('copyCsvBtn');

    const rackNumberEl = document.getElementById('rackNumber');
    const shelfCountEl = document.getElementById('shelfCount');
    const binsPerShelfEl = document.getElementById('binsPerShelf');
    const defaultPositionsEl = document.getElementById('defaultPositions');

    const rackMap = document.getElementById('rackMap');
    const binListBody = document.getElementById('binListBody');

    const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
    let rackState = [];

    function pad2(v){ return String(v).padStart(2,'0'); }
    function shelfLetter(i){ return alphabet[i] || 'z'; }

    function buildState(){
      rackState = [];
      const rack = parseInt(rackNumberEl.value || '1');
      const shelves = parseInt(shelfCountEl.value || '1');
      const bins = parseInt(binsPerShelfEl.value || '1');
      const positions = parseInt(defaultPositionsEl.value || '1');

      for(let s=0;s<shelves;s++){
        for(let b=0;b<bins;b++){
          rackState.push({
            rack,
            shelfIndex:s,
            binIndex:b,
            positions
          });
        }
      }
    }

    function compactCode(r,s,b,p){
      let end = alphabet[p-1] || 'a';
      return p === 1
        ? `${pad2(r)}-${shelfLetter(s)}-${pad2(b+1)}-a`
        : `${pad2(r)}-${shelfLetter(s)}-${pad2(b+1)}-a:${end}`;
    }

    function expanded(r,s,b,p){
      let out=[];
      for(let i=0;i<p;i++){
        out.push(`${pad2(r)}-${shelfLetter(s)}-${pad2(b+1)}-${alphabet[i]}`);
      }
      return out;
    }

    function renderMap(){
      rackMap.innerHTML = '';

      let shelves = parseInt(shelfCountEl.value || '1');
      let bins = parseInt(binsPerShelfEl.value || '1');

      for(let s=0;s<shelves;s++){
        let row = document.createElement('div');
        row.style.display='grid';
        row.style.gridTemplateColumns=`80px repeat(${bins},1fr)`;
        row.style.gap='8px';

        let tag = document.createElement('div');
        tag.textContent='Shelf '+shelfLetter(s);
        row.appendChild(tag);

        for(let b=0;b<bins;b++){
          let item = rackState.find(x=>x.shelfIndex===s && x.binIndex===b);

          let tile = document.createElement('div');
          tile.style.border='1px solid rgba(255,255,255,.1)';
          tile.style.padding='8px';

          tile.innerHTML = `
            <div>${compactCode(item.rack,s,b,item.positions)}</div>
            <select data-s="${s}" data-b="${b}">
              ${[1,2,3,4,5].map(n=>`<option ${item.positions===n?'selected':''}>${n}</option>`).join('')}
            </select>
          `;

          row.appendChild(tile);
        }

        rackMap.appendChild(row);
      }

      rackMap.querySelectorAll('select').forEach(sel=>{
        sel.addEventListener('change', e=>{
          let s = parseInt(e.target.dataset.s);
          let b = parseInt(e.target.dataset.b);
          let item = rackState.find(x=>x.shelfIndex===s && x.binIndex===b);
          item.positions = parseInt(e.target.value);
          renderMap();
          renderList();
        });
      });
    }

    function renderList(){
      binListBody.innerHTML='';

      rackState.forEach(item=>{
        expanded(item.rack,item.shelfIndex,item.binIndex,item.positions)
        .forEach(loc=>{
          let tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${loc}</td>
            <td><input></td>
            <td><input></td>
            <td><input></td>
            <td><input></td>
            <td>${loc}</td>
          `;
          binListBody.appendChild(tr);
        });
      });
    }

    function buildAll(){
      buildState();
      renderMap();
      renderList();
    }

    buildBtn.onclick = buildAll;

    resetBtn.onclick = () => {
      rackNumberEl.value=1;
      shelfCountEl.value=4;
      binsPerShelfEl.value=6;
      defaultPositionsEl.value=1;
      buildAll();
    };

    copyCsvBtn.onclick = () => {
      alert('CSV copy coming next step');
    };

    buildAll();

  } catch(e) {
    alert('Script error: ' + e.message);
  }
})();
</script>
